<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Resume Tailor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo"><h1>Resume <span class="accent">Tailor</span></h1></div>
      <p class="auth-sub">Sign in to tailor and manage your resumes.</p>

      <div class="auth-msg" id="auth-msg"></div>

      <form id="login-form" autocomplete="off">
        <!-- Off-screen decoys absorb the browser's autofill so the real fields stay empty. -->
        <input type="text" name="username" tabindex="-1" aria-hidden="true" autocomplete="username" class="autofill-decoy" />
        <input type="password" name="password" tabindex="-1" aria-hidden="true" autocomplete="current-password" class="autofill-decoy" />
        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" inputmode="email" id="email" name="rt_login_email" autocomplete="off" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="rt_login_pw" autocomplete="new-password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign in</button>
      </form>

      <div class="auth-foot">
        Don't have an account? Ask your administrator to create one.<br />
        <a href="/admin">Admin portal →</a>
      </div>
    </div>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
